<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Swing Demo</title>
</head>
<body>

<nav>
  <div class="logo">⛳ Golf<span>Demo</span></div>
</nav>

<div class="page">

  <!-- LEFT col (desktop only) -->
  <div class="left">
    <div class="header">
      <h1>Examples of <span>golf swing</span> in 3D</h1>
      <p>Drag to rotate, pinch to zoom. Tap a button to watch the animation.</p>
    </div>
    <div class="desktop-btns" id="anim-ui-desktop"></div>
  </div>

  <!-- RIGHT col / main mobile content -->
  <div class="right">
    <!-- Buttons ABOVE the viewer on mobile -->
    <div id="anim-ui"></div>

    <!-- 3D viewer -->
    <div class="viewer-wrap" id="viewer">
      <div class="orbit-hint">👆 Drag to rotate · Pinch to zoom</div>
    </div>
  </div>

</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
