<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FBX Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
    }

    canvas { display: block; }

    /* ── Loading overlay ── */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1a1a2e;
      color: #fff;
      font-size: 1rem;
      z-index: 100;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Animation switcher UI ── */
    #anim-ui {
      position: fixed;
      top: 16px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 12px;
      border-radius: 10px;
      color: #fff;
      font-size: 0.85rem;
      z-index: 10;
    }

    #anim-ui strong { margin-bottom: 4px; display: block; }

    #anim-ui button {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
      text-align: left;
    }

    #anim-ui button:hover { background: rgba(255,255,255,0.1); }
    #anim-ui button.active { background: rgba(255,255,255,0.25); border-color: #fff; }

    /* ── Controls hint ── */
    #hint {
      position: fixed;
      bottom: 16px;
      right: 16px;
      color: rgba(255,255,255,0.45);
      font-size: 0.75rem;
      text-align: right;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="hint">
  🖱 Left drag · rotate &nbsp;|&nbsp; Right drag · pan &nbsp;|&nbsp; Scroll · zoom
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
